<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Maze – CCM Consultancy</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#1a1a2e;color:#eee;min-height:100vh;display:flex;flex-direction:column;align-items:center}
  #app{width:100%;max-width:760px;padding:16px}
  .header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#111;border-radius:10px;margin-bottom:14px;border:1px solid #333}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-text{font-size:22px;font-weight:900;color:#e63946;letter-spacing:-1px}
  .logo-sub{font-size:9px;letter-spacing:3px;color:#aaa;display:block;margin-top:-4px}
  .timer-box{text-align:right}
  .timer-label{font-size:11px;color:#aaa;letter-spacing:1px}
  .timer-val{font-size:28px;font-weight:700;color:#f4a261;font-variant-numeric:tabular-nums}
  .progress-bar{background:#222;border-radius:6px;height:6px;margin-bottom:12px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,#e63946,#f4a261);border-radius:6px;transition:width .5s}
  .scene-card{background:#16213e;border-radius:12px;padding:20px;margin-bottom:12px;border:1px solid #2a2a5a}
  .scene-tag{font-size:10px;letter-spacing:2px;color:#f4a261;text-transform:uppercase;margin-bottom:8px}
  .scene-title{font-size:18px;font-weight:700;color:#fff;margin-bottom:10px;line-height:1.4}
  .scene-body{font-size:14px;line-height:1.7;color:#c9c9e0}
  .dialogue{margin:6px 0;padding-left:12px;border-left:2px solid #2a2a5a}
  .speaker{color:#f4a261;font-weight:600}
  .feedback-banner{border-radius:8px;padding:12px 14px;margin-top:12px;font-size:13px;line-height:1.6}
  .feedback-banner.wrong{background:#3a1212;border:1px solid #8b0000;color:#ffaaaa}
  .feedback-banner.info{background:#1a2040;border:1px solid #3a4a8a;color:#aac0ff}
  .choices{display:flex;flex-direction:column;gap:8px}
  .choice-btn{background:#0f3460;border:1px solid #1a4a8a;color:#d0e4ff;border-radius:8px;padding:12px 16px;font-size:14px;line-height:1.5;cursor:pointer;text-align:left;transition:all .2s;display:flex;align-items:flex-start;gap:10px}
  .choice-btn:hover{background:#1a4a8a;border-color:#4a7fc1;color:#fff}
  .choice-label{min-width:22px;height:22px;border-radius:50%;background:#1a4a8a;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#7ab3ff;flex-shrink:0;margin-top:1px}
  .choice-btn:hover .choice-label{background:#e63946;color:#fff}
  .meta-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .mistakes{font-size:12px;color:#c44}
  .step-count{font-size:12px;color:#aaa}
  .crumbs{font-size:11px;color:#555;margin-bottom:10px}
  .crumb-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#333;margin:0 2px;vertical-align:middle}
  .crumb-dot.correct{background:#1a7a40}
  .crumb-dot.wrong{background:#8b0000}

  /* Name entry modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:100}
  .modal{background:#16213e;border:1px solid #2a2a5a;border-radius:14px;padding:28px;width:90%;max-width:380px;text-align:center}
  .modal h2{font-size:20px;color:#fff;margin-bottom:8px}
  .modal p{font-size:13px;color:#aaa;margin-bottom:18px}
  .modal input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #2a5a8a;background:#0f2040;color:#fff;font-size:15px;margin-bottom:14px;outline:none}
  .modal input:focus{border-color:#f4a261}
  .modal-btn{background:#e63946;color:#fff;border:none;padding:11px 0;width:100%;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer}
  .modal-btn:hover{background:#c0252f}

  /* Win screen */
  .win-screen{text-align:center;padding:30px 20px;background:#16213e;border-radius:12px;border:1px solid #2a2a5a}
  .win-icon{font-size:48px;margin-bottom:12px}
  .win-title{font-size:26px;font-weight:800;color:#f4a261;margin-bottom:8px}
  .win-sub{font-size:14px;color:#aaa;margin-bottom:20px}
  .stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
  .stat-card{background:#111;border-radius:8px;padding:14px;border:1px solid #333}
  .stat-val{font-size:22px;font-weight:700;color:#f4a261}
  .stat-label{font-size:11px;color:#888;margin-top:4px}
  .rating-badge{display:inline-block;padding:8px 20px;border-radius:20px;font-size:15px;font-weight:700;margin-bottom:20px}
  .rating-gold{background:#3a2800;color:#f4a261;border:1px solid #f4a261}
  .rating-silver{background:#1a2230;color:#a0c0ff;border:1px solid #4a7fc1}
  .rating-bronze{background:#2a1515;color:#ffaaaa;border:1px solid #c44}
  .win-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .btn-primary{background:#e63946;color:#fff;border:none;padding:11px 22px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
  .btn-primary:hover{background:#c0252f}
  .btn-secondary{background:transparent;color:#a0c0ff;border:1px solid #2a4a7a;padding:11px 22px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
  .btn-secondary:hover{background:#1a3050}

  /* Leaderboard */
  .lb-panel{background:#16213e;border-radius:12px;border:1px solid #2a2a5a;overflow:hidden;margin-top:12px}
  .lb-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:#111;border-bottom:1px solid #2a2a5a}
  .lb-title{font-size:16px;font-weight:700;color:#f4a261;display:flex;align-items:center;gap:8px}
  .lb-tab-row{display:flex;gap:0;border-bottom:1px solid #2a2a5a}
  .lb-tab{flex:1;padding:9px;text-align:center;font-size:12px;cursor:pointer;color:#aaa;border-bottom:2px solid transparent;transition:all .2s}
  .lb-tab.active{color:#f4a261;border-bottom-color:#f4a261;background:#0d1625}
  .lb-empty{padding:28px;text-align:center;color:#555;font-size:13px}
  .lb-row{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid #1a2a3a;gap:12px;transition:background .2s}
  .lb-row:hover{background:#1a2a4a}
  .lb-row:last-child{border-bottom:none}
  .lb-rank{font-size:18px;min-width:28px;text-align:center}
  .lb-name{flex:1;font-size:14px;font-weight:600;color:#e0e8ff}
  .lb-badges{display:flex;gap:6px;align-items:center}
  .lb-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700}
  .badge-gold{background:#3a2800;color:#f4a261}
  .badge-silver{background:#1a2230;color:#a0c0ff}
  .badge-bronze{background:#2a1515;color:#ff8888}
  .lb-time{font-size:13px;color:#f4a261;font-variant-numeric:tabular-nums;min-width:48px;text-align:right}
  .lb-mistakes{font-size:11px;color:#888;min-width:60px;text-align:right}
  .lb-eff{font-size:12px;font-weight:700;min-width:38px;text-align:right}
  .my-row{background:#0d2040 !important;border-left:3px solid #f4a261}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo">
      <svg width="36" height="36" viewBox="0 0 36 36"><circle cx="18" cy="18" r="18" fill="#e63946"/><text x="18" y="23" text-anchor="middle" font-size="13" font-weight="900" fill="#fff" font-family="Arial">CCM</text></svg>
      <div><div class="logo-text">CCM<span style="color:#fff;font-size:14px;font-weight:400"> ›</span></div><span class="logo-sub">CONSULTANCY</span></div>
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <button class="btn-secondary" style="padding:7px 14px;font-size:12px" onclick="toggleLB()">🏆 Leaderboard</button>
      <div class="timer-box"><div class="timer-label">ELAPSED TIME</div><div class="timer-val" id="timer">00:00</div></div>
    </div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:5%"></div></div>
  <div class="meta-row">
    <div class="mistakes" id="mistake-count">⚠ Mistakes: 0</div>
    <div class="step-count" id="step-count">Step 1 of ~9</div>
  </div>
  <div class="crumbs" id="crumbs"></div>
  <div id="scene-area"></div>
  <div id="lb-container" style="display:none"></div>
</div>

<!-- Name modal -->
<div class="modal-overlay" id="name-modal" style="display:none">
  <div class="modal">
    <div style="font-size:36px;margin-bottom:8px">🎯</div>
    <h2>Deal Secured!</h2>
    <p>Enter your name to save your score to the leaderboard.</p>
    <input type="text" id="player-name" placeholder="Your name" maxlength="24" />
    <button class="modal-btn" onclick="submitScore()">Save My Score</button>
  </div>
</div>

<script>
const STEPS=[
  {id:'intro',tag:'Background',title:'Let There Be Light – The GCC Sales Challenge',body:`<p>You are advising <strong>Layla Al-Rashidi</strong> — a Sales Executive at <strong>LumiTech Gulf LLC</strong>, based in Dubai. LumiTech's sole product is a plug-in fluorescent lamp that gives the warm glow of a traditional tungsten bulb.</p><p style="margin-top:10px">Layla covers commercial sales across the UAE, targeting interior designers, architects, hotel chains, and property developers.</p><p style="margin-top:10px"><strong>The opportunity:</strong> While researching leads, Layla spots an article in <em>Arabian Business</em>:</p><blockquote style="margin:12px 0;padding:12px;background:#0d1a2e;border-radius:6px;border-left:3px solid #f4a261;font-style:italic;color:#c9c9e0">"<strong>Al-Nakheel Developments</strong>, a construction group based in Abu Dhabi, has acquired three boutique hotel chains across the UAE. Their Contracts Director, <strong>Faisal Al-Mansoori</strong>, confirmed the group plans full refurbishments within 3 years."</blockquote><p style="margin-top:8px">Layla sees a first-class prospect — and has the buyer's name. <strong>What should she do first?</strong></p>`,choices:[{label:'A',text:'Do more research on Al-Nakheel Developments before reaching out.',next:'research_first',correct:true},{label:'B',text:'Telephone Faisal Al-Mansoori to get an appointment immediately.',next:'call_faisal',correct:false},{label:'C',text:'Make a cold call directly to Al-Nakheel\'s Abu Dhabi office.',next:'cold_call_faisal',correct:false}],progress:10},
  {id:'research_first',tag:'✔ Good Decision',title:'Research: Al-Nakheel Developments',body:`<p>Smart move. Layla digs deeper and discovers Al-Nakheel is a holding company with subsidiaries including <strong>Al-Mansoori Interiors LLC</strong>, run by <strong>Mrs Rania Al-Mansoori</strong> — who specifies all lighting for Al-Nakheel hotel projects. Faisal is Contracts Director but doesn't choose the fittings.</p><p style="margin-top:10px"><strong>Who should Layla approach first?</strong></p>`,choices:[{label:'A',text:'Sparks MEP Contractors, then Mrs Rania Al-Mansoori.',next:'wrong_order',correct:false},{label:'B',text:'Mrs Rania Al-Mansoori first, then Sparks MEP Contractors.',next:'rania_first',correct:true},{label:'C',text:'Faisal Al-Mansoori only — he is the Contracts Director.',next:'faisal_only',correct:false},{label:'D',text:'Mrs Rania Al-Mansoori only.',next:'rania_only',correct:false}],progress:25},
  {id:'rania_first',tag:'✔ Correct Strategy',title:'Getting an appointment with Mrs Rania Al-Mansoori',body:`<p>Layla calls Al-Mansoori Interiors. The receptionist asks: <span class="speaker">"May I tell her what the call is about?"</span></p><p style="margin-top:10px"><strong>How should Layla respond?</strong></p>`,choices:[{label:'A',text:'"It\'s about reducing electricity costs in the hotels."',next:'call_electricity',correct:false},{label:'B',text:'"It\'s a personal matter I must discuss with Mrs Al-Mansoori directly."',next:'call_personal',correct:false,penalty:true},{label:'C',text:'"It\'s about achieving tungsten lighting quality without the heat problems."',next:'call_heat',correct:true},{label:'D',text:'"I\'m sorry — could you put me through to Mrs Al-Mansoori\'s PA please?"',next:'call_pa',correct:false}],progress:38},
  {id:'call_heat',tag:'✔ Great Hook',title:'Appointment secured!',body:`<p>The receptionist puts Layla through. Mrs Al-Mansoori is intrigued and books a meeting. Layla arrives at the Abu Dhabi office prepared with samples and cost figures.</p><p style="margin-top:10px">After pleasantries, Mrs Al-Mansoori opens:</p><div class="dialogue"><span class="speaker">Mrs Al-Mansoori:</span> "Well, Layla — where is this miracle light that lets a designer achieve the right scheme without the Finance Director breathing down her neck?"</div><p style="margin-top:10px">Layla takes out a stunning 3-lamp wall fitting. <strong>What should she say next?</strong></p>`,choices:[{label:'A',text:'Say nothing — let Mrs Al-Mansoori look at it first.',next:'silence_wins',correct:true},{label:'B',text:'"How do you like that?" — invite her immediate reaction.',next:'how_do_you_like',correct:false},{label:'C',text:'"A stunning fitting — and it cuts electricity costs by 75%."',next:'wrong_pitch',correct:false},{label:'D',text:'"Look at how the lamps and fitting complement one another."',next:'wrong_pitch',correct:false}],progress:50},
  {id:'silence_wins',tag:'✔ Smart Selling',title:'The silent sell',body:`<p>Layla said nothing. Mrs Al-Mansoori examined the fitting from every angle, then studied 3 more samples.</p><div class="dialogue" style="margin-top:10px"><span class="speaker">Mrs Al-Mansoori:</span> "Yes, they're attractive. But what makes them <em>special</em> compared to other wall fittings?"</div><p style="margin-top:10px"><strong>How should Layla respond?</strong></p>`,choices:[{label:'A',text:'"These feature our unique LumiTech lamps — the latest development in lighting technology."',next:'feature_talk',correct:false},{label:'B',text:'"The lamps last 5,000 hours — you won\'t need to change them for years."',next:'lamp_life_wrong',correct:false},{label:'C',text:'"These lamps produce virtually no heat, so they won\'t damage décor — yet cost far less to run than tungsten."',next:'benefit_pitch',correct:true}],progress:62},
  {id:'benefit_pitch',tag:'✔ Benefit-led Selling',title:'Handling the price objection',body:`<div class="dialogue"><span class="speaker">Mrs Al-Mansoori:</span> "There has to be a catch. I bet they're phenomenally expensive."</div><p style="margin-top:10px"><strong>What is the best response?</strong></p>`,choices:[{label:'A',text:'"At first the price does look high — but electricity savings more than cover the difference, and you eliminate the heat problem."',next:'price_objection_handle',correct:true},{label:'B',text:'"Yes, but you save more than the extra $9 in electricity costs."',next:'wrong_price',correct:false},{label:'C',text:'"What do you think they cost, Mrs Al-Mansoori?"',next:'price_question',correct:false},{label:'D',text:'"Let me show you just how affordable they really are." (pulls out calculator)',next:'numbers_too_early',correct:false}],progress:74},
  {id:'price_objection_handle',tag:'✔ Objection Handled',title:'Time to close?',body:`<div class="dialogue"><span class="speaker">Mrs Al-Mansoori:</span> "I'd be happy to eliminate the heat problem — especially if it doesn't cost more. Our MEP engineers always complain about heat from our lighting schemes."</div><div class="dialogue" style="margin-top:8px"><span class="speaker">Layla:</span> "That fitting costs ~$20 more than its tungsten equivalent — but over 5,000 hours you'll save almost $40 in electricity and replacement costs."</div><div class="dialogue" style="margin-top:8px"><span class="speaker">Mrs Al-Mansoori:</span> "Our contractors review numbers. But I do want to solve the heat problem without extra cost."</div><p style="margin-top:10px">Clear buying signals. <strong>Is it time to close?</strong></p>`,choices:[{label:'A',text:'Yes — close now.',next:'close_now',correct:true},{label:'B',text:'No — not yet. Build more value first.',next:'hesitate',correct:false}],progress:85},
  {id:'close_now',tag:'✔ Closing',title:'The close — and the next move',body:`<div class="dialogue"><span class="speaker">Layla:</span> "Would the brushed nickel or gold finish suit your designs better?"</div><div class="dialogue"><span class="speaker">Mrs Al-Mansoori:</span> "Gold, definitely."</div><div class="dialogue"><span class="speaker">Mrs Al-Mansoori:</span> "Orders go through Sparks MEP — but I'll recommend your fittings. Leave two catalogues; I'll pass one to them."</div><p style="margin-top:10px"><strong>Should Layla simply leave the catalogues and go?</strong></p>`,choices:[{label:'A',text:'Yes — Mrs Al-Mansoori has the relationship. Leave the catalogues.',next:'wrong_close',correct:false},{label:'B',text:'No — use the second catalogue as a reason to visit Sparks MEP personally.',next:'visit_sparks',correct:true}],progress:93},
  {id:'visit_sparks',tag:'✔ Excellent Move',title:'Visiting Sparks MEP — the final step',body:`<p>Layla arranges to drop the catalogue at Sparks MEP in person and meets <strong>Tariq Saleh</strong>, their Contracts Manager.</p><div class="dialogue" style="margin-top:8px"><span class="speaker">Tariq:</span> "Mrs Al-Mansoori says you're bringing a designer's dream catalogue. Let me guess — looks great, but a nightmare for my teams?"</div><p style="margin-top:10px"><strong>What is Layla's best response?</strong></p>`,choices:[{label:'A',text:'"Actually, these reduce your maintenance burden — lamps last 5,000 hours, so corridor lights only need changing every 6 months instead of every 6 weeks."',next:'win',correct:true},{label:'B',text:'"Actually, they also cut electricity costs significantly."',next:'sparks_wrong',correct:false},{label:'C',text:'"They bring all the benefits of fluorescent to tungsten-style fittings."',next:'sparks_vague',correct:false}],progress:99}
];

const OUTCOMES={
  call_faisal:{type:'wrong',text:'Calling immediately without research means Layla targets the wrong contact. Faisal handles contracts but doesn\'t specify lighting.',redirect:'intro'},
  cold_call_faisal:{type:'wrong',text:'A cold call without research is premature — Layla doesn\'t yet know who the real decision maker is.',redirect:'intro'},
  wrong_order:{type:'wrong',text:'Sparks MEP will redirect Layla straight back to Mrs Al-Mansoori. Always start with the specifier, not the contractor.',redirect:'research_first'},
  faisal_only:{type:'wrong',text:'Faisal controls contracts but doesn\'t specify lighting. He\'ll refer Layla to Sparks MEP without influencing the product choice.',redirect:'research_first'},
  rania_only:{type:'info',text:'Close — but Layla should plan to see Mrs Al-Mansoori AND then Sparks MEP. The specifier recommends; the contractor places the order.',redirect:'rania_first'},
  call_electricity:{type:'wrong',text:'Mrs Al-Mansoori is an interior designer. Electricity costs aren\'t her primary concern — design and aesthetics are. Wrong hook.',redirect:'rania_first'},
  call_personal:{type:'wrong',text:'Claiming it\'s a "personal matter" is deceptive. Mrs Al-Mansoori would refuse to deal with Layla or LumiTech. Never use deceptive tactics.',redirect:'rania_first'},
  call_pa:{type:'wrong',text:'Mrs Al-Mansoori has no PA — the receptionist says so. This wastes time and credibility.',redirect:'rania_first'},
  how_do_you_like:{type:'wrong',text:'Mrs Al-Mansoori is engrossed examining the fitting. Asking questions while she\'s distracted gets no response. Stay silent.',redirect:'call_heat'},
  wrong_pitch:{type:'wrong',text:'Mrs Al-Mansoori is too focused on the fitting to respond. Let the product sell itself first — say nothing.',redirect:'call_heat'},
  feature_talk:{type:'wrong',text:'"Newest development" is a feature, not a benefit. She replies: "But what does it do for my designs?" Lead with benefits.',redirect:'silence_wins'},
  lamp_life_wrong:{type:'wrong',text:'Mrs Al-Mansoori responds coldly: "As I don\'t change lamps, that doesn\'t thrill me." Wrong benefit for this buyer.',redirect:'silence_wins'},
  wrong_price:{type:'wrong',text:'Mentioning "$9" invites her to ask the total price — which sounds high without context. Frame value before numbers.',redirect:'benefit_pitch'},
  price_question:{type:'wrong',text:'"A phenomenal amount," she says. That doesn\'t move things forward. Lead with value before discussing price.',redirect:'benefit_pitch'},
  numbers_too_early:{type:'wrong',text:'Pulling out calculations too early turns Mrs Al-Mansoori off — she says "leave the catalogue." Don\'t number-crunch with a designer.',redirect:'benefit_pitch'},
  hesitate:{type:'wrong',text:'"He who hesitates is lost." Mrs Al-Mansoori gave clear buying signals. Waiting risks losing her attention.',redirect:'price_objection_handle'},
  wrong_close:{type:'wrong',text:'Leaving without visiting Sparks MEP means losing control of the sale. The contractor could choose a competitor.',redirect:'close_now'},
  sparks_wrong:{type:'wrong',text:'Tariq says: "Our Finance Director might care — but it doesn\'t excite me." Contractors care about maintenance, not electricity bills.',redirect:'visit_sparks'},
  sparks_vague:{type:'wrong',text:'Too vague. Tariq asks: "What benefits exactly?" Layla loses momentum. Lead with the benefit most relevant to a contractor.',redirect:'visit_sparks'}
};

let current='intro',startTime=Date.now(),timerInterval,mistakes=0,steps=0,history=[],finished=false,lbVisible=false,pendingScore=null;

function fmt(ms){const s=Math.floor(ms/1000);return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function score(ms,m){return Math.max(0,10000-Math.floor(ms/1000)*10-m*200)}

function startTimer(){timerInterval=setInterval(()=>{if(!finished)document.getElementById('timer').textContent=fmt(Date.now()-startTime);},500)}

function renderCrumbs(){
  document.getElementById('crumbs').innerHTML=history.map((h,i)=>`<span class="crumb-dot ${h}" title="Step ${i+1}"></span>`).join('');
}

function renderScene(id){
  const scene=STEPS.find(s=>s.id===id);
  if(!scene)return;
  steps++;
  document.getElementById('step-count').textContent=`Step ${steps} of ~9`;
  document.getElementById('progress').style.width=scene.progress+'%';
  document.getElementById('lb-container').style.display='none';
  lbVisible=false;
  document.getElementById('scene-area').innerHTML=`
    <div class="scene-card">
      <div class="scene-tag">${scene.tag}</div>
      <div class="scene-title">${scene.title}</div>
      <div class="scene-body">${scene.body}</div>
    </div>
    <div class="choices" id="choices">
      ${scene.choices.map(c=>`<button class="choice-btn" onclick="choose('${c.next}',${c.correct},'${id}')">
        <span class="choice-label">${c.label}</span><span>${c.text}</span></button>`).join('')}
    </div>`;
}

function choose(next,correct,fromId){
  if(correct){
    history.push('correct');renderCrumbs();
    if(next==='win')showWin();else renderScene(next);
  } else {
    mistakes++;history.push('wrong');renderCrumbs();
    document.getElementById('mistake-count').textContent=`⚠ Mistakes: ${mistakes}`;
    const o=OUTCOMES[next];
    const banner=document.createElement('div');
    banner.className=`feedback-banner ${o&&o.type==='info'?'info':'wrong'}`;
    banner.innerHTML=`<strong>${o&&o.type==='info'?'ℹ Note':'✗ Not quite'}:</strong> ${o?o.text:'That path leads to a dead end.'}<br><br>
      <button onclick="renderScene('${o?o.redirect:fromId}')" style="background:#e63946;color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;margin-top:4px">↩ Try again</button>`;
    const card=document.getElementById('scene-area').querySelector('.scene-card');
    card.after(banner);
    document.getElementById('choices').style.cssText='opacity:.3;pointer-events:none';
    banner.scrollIntoView({behavior:'smooth',block:'center'});
  }
}

function showWin(){
  finished=true;clearInterval(timerInterval);
  const elapsed=Date.now()-startTime;
  const secs=Math.floor(elapsed/1000);
  const eff=Math.max(0,100-mistakes*12);
  const sc=score(elapsed,mistakes);
  let rating,rc;
  if(mistakes===0&&secs<180){rating='🏆 Gold – Elite Closer';rc='rating-gold';}
  else if(mistakes<=2){rating='🥈 Silver – Sharp Salesperson';rc='rating-silver';}
  else{rating='🥉 Bronze – Keep Practising';rc='rating-bronze';}
  pendingScore={time:elapsed,mistakes,efficiency:eff,score:sc,rating,fmt:fmt(elapsed)};
  document.getElementById('scene-area').innerHTML=`
    <div class="win-screen">
      <div class="win-icon">🎯</div>
      <div class="win-title">Deal Secured!</div>
      <div class="win-sub">Layla landed the Al-Nakheel Hotels contract — LumiTech Gulf wins the project!</div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-val">${fmt(elapsed)}</div><div class="stat-label">Time Taken</div></div>
        <div class="stat-card"><div class="stat-val">${mistakes}</div><div class="stat-label">Wrong Turns</div></div>
        <div class="stat-card"><div class="stat-val">${eff}%</div><div class="stat-label">Efficiency</div></div>
      </div>
      <div class="rating-badge ${rc}">${rating}</div>
      <p style="font-size:13px;color:#888;margin-bottom:20px">Research first · match benefits to the buyer · close on signals · follow up with the order placer.</p>
      <div class="win-btns">
        <button class="btn-primary" onclick="openNameModal()">🏆 Save to Leaderboard</button>
        <button class="btn-secondary" onclick="restart()">▶ Play Again</button>
      </div>
    </div>`;
  document.getElementById('progress').style.width='100%';
}

function openNameModal(){
  document.getElementById('name-modal').style.display='flex';
  setTimeout(()=>document.getElementById('player-name').focus(),100);
}

async function submitScore(){
  const name=document.getElementById('player-name').value.trim();
  if(!name)return;
  document.getElementById('name-modal').style.display='none';
  if(!pendingScore)return;
  const entry={name,time:pendingScore.time,fmt:pendingScore.fmt,mistakes:pendingScore.mistakes,efficiency:pendingScore.efficiency,score:pendingScore.score,rating:pendingScore.rating,ts:Date.now()};
  try{await window.storage.set('lb:'+entry.ts,JSON.stringify(entry),true);}catch(e){console.log('Storage error',e);}
  pendingScore=null;
  showLeaderboard(name);
}

async function loadScores(){
  try{
    const res=await window.storage.list('lb:',true);
    if(!res||!res.keys||!res.keys.length)return[];
    const entries=await Promise.all(res.keys.map(async k=>{
      try{const r=await window.storage.get(k,true);return r?JSON.parse(r.value):null;}catch{return null;}
    }));
    return entries.filter(Boolean).sort((a,b)=>b.score-a.score).slice(0,20);
  }catch{return[];}
}

async function toggleLB(){
  lbVisible=!lbVisible;
  if(lbVisible)showLeaderboard();
  else document.getElementById('lb-container').style.display='none';
}

async function showLeaderboard(highlight){
  const scores=await loadScores();
  const medals=['🥇','🥈','🥉'];
  const container=document.getElementById('lb-container');
  container.style.display='block';
  lbVisible=true;

  if(!scores.length){
    container.innerHTML=`<div class="lb-panel"><div class="lb-header"><div class="lb-title">🏆 Leaderboard</div></div><div class="lb-empty">No scores yet — be the first to complete the maze!</div></div>`;
    return;
  }

  const rows=scores.map((s,i)=>{
    const isMe=highlight&&s.name===highlight&&i===scores.findIndex(x=>x.name===highlight&&x.ts===s.ts);
    const rankIcon=i<3?medals[i]:`<span style="font-size:13px;color:#555">${i+1}</span>`;
    const ratingShort=s.rating.includes('Gold')?'Gold':s.rating.includes('Silver')?'Silver':'Bronze';
    const bc=ratingShort==='Gold'?'badge-gold':ratingShort==='Silver'?'badge-silver':'badge-bronze';
    const effColor=s.efficiency>=90?'#7dffb0':s.efficiency>=70?'#f4a261':'#ff8888';
    return `<div class="lb-row${isMe?' my-row':''}">
      <div class="lb-rank">${rankIcon}</div>
      <div class="lb-name">${s.name}${isMe?' <span style="font-size:10px;color:#f4a261">◀ you</span>':''}</div>
      <div class="lb-badges"><span class="lb-badge ${bc}">${ratingShort}</span></div>
      <div class="lb-time">${s.fmt}</div>
      <div class="lb-mistakes" style="color:#888">${s.mistakes} mistake${s.mistakes!==1?'s':''}</div>
      <div class="lb-eff" style="color:${effColor}">${s.efficiency}%</div>
    </div>`;
  }).join('');

  container.innerHTML=`<div class="lb-panel">
    <div class="lb-header">
      <div class="lb-title">🏆 Global Leaderboard</div>
      <span style="font-size:11px;color:#555">${scores.length} player${scores.length!==1?'s':''}</span>
    </div>
    <div style="display:flex;padding:6px 16px;background:#0d1020;font-size:10px;color:#555;gap:12px">
      <span style="min-width:28px">Rank</span><span style="flex:1">Name</span><span style="min-width:50px">Rating</span>
      <span style="min-width:48px;text-align:right">Time</span>
      <span style="min-width:60px;text-align:right">Mistakes</span>
      <span style="min-width:38px;text-align:right">Eff.</span>
    </div>
    ${rows}
  </div>`;
  container.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function restart(){
  current='intro';mistakes=0;steps=0;history=[];finished=false;pendingScore=null;
  startTime=Date.now();
  document.getElementById('mistake-count').textContent='⚠ Mistakes: 0';
  document.getElementById('timer').textContent='00:00';
  document.getElementById('crumbs').innerHTML='';
  document.getElementById('lb-container').style.display='none';
  lbVisible=false;
  renderScene('intro');
}

startTimer();
renderScene('intro');
</script>
</body>
</html>
